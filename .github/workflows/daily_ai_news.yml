name: daily_ai_news

on:
  workflow_dispatch:
    inputs:
      scheduled_dispatch:
        description: "GASなど外部スケジューラからの定期実行として扱う"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: daily-ai-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate briefing and send LINE message
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
          LINE_TO_IDS: ${{ secrets.LINE_TO_IDS }}
          APPROVED_USERS_ENDPOINT: ${{ secrets.APPROVED_USERS_ENDPOINT }}
          APPROVED_USERS_API_KEY: ${{ secrets.APPROVED_USERS_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SCHEDULED_DISPATCH: ${{ github.event.inputs.scheduled_dispatch || 'false' }}
        run: python main.py

      - name: Commit generated docs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "docsに変更がないためcommit/pushをスキップします。"
          else
            git commit -m "Update daily AI news"
            git push
          fi
